name: SDmon Host Runner
version: "1.0.0"
slug: sdmon_host
description: Privileged sdmon runner with direct SD card access for HAOS
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
startup: application
boot: auto
init: false
host_pid: true
host_network: false
apparmor: false
full_access: true
privileged:
  - SYS_RAWIO
  - SYS_ADMIN
  - DAC_OVERRIDE
devices:
  - /dev/mmcblk0
  - /dev/mmcblk0p1
  - /dev/mmcblk0p2
map:
  - share:rw
options:
  device: /dev/mmcblk0
  add_delay: true
  scan_interval: 300
  output_file: /share/sdmon_status.json
schema:
  device: str
  add_delay: bool
  scan_interval: int(60,86400)
  output_file: str
