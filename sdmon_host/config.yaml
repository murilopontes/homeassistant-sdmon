name: SDmon Host Runner
version: "1.0.4"
slug: sdmon_host
description: Privileged sdmon runner with direct SD card access for HAOS
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
apparmor: false
full_access: true
privileged:
  - SYS_RAWIO
  - SYS_ADMIN
map:
  - share:rw
options:
  device: /dev/mmcblk0
  add_delay: true
  scan_interval: 300
  output_file: /share/sdmon_status.json
schema:
  device: str
  add_delay: bool
  scan_interval: int
  output_file: str
